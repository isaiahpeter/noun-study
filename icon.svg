<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Book shape -->
  <rect x="120" y="130" width="272" height="320" rx="18" fill="none"
        stroke="#ffffff" stroke-width="18" stroke-opacity="0.25"/>

  <!-- Book spine -->
  <line x1="210" y1="130" x2="210" y2="450"
        stroke="#ffffff" stroke-width="14" stroke-opacity="0.3"/>

  <!-- Pages left -->
  <line x1="135" y1="195" x2="198" y2="195"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="135" y1="225" x2="198" y2="225"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="135" y1="255" x2="198" y2="255"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Pages right — main content area -->
  <line x1="228" y1="185" x2="376" y2="185"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="228" y1="215" x2="340" y2="215"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="228" y1="245" x2="376" y2="245"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="228" y1="275" x2="310" y2="275"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- AI spark — bottom right -->
  <circle cx="355" cy="355" r="72" fill="#0f1623" fill-opacity="0.6"/>
  <circle cx="355" cy="355" r="72" fill="none"
          stroke="#60a5fa" stroke-width="4" stroke-opacity="0.6"/>

  <!-- Spark / star shape -->
  <path d="M355 305 L363 343 L401 355 L363 367 L355 405 L347 367 L309 355 L347 343 Z"
        fill="#ffffff" fill-opacity="0.95"/>

  <!-- N letter subtle -->
  <text x="256" y="480" text-anchor="middle"
        font-family="system-ui, sans-serif"
        font-size="22" font-weight="700"
        fill="#ffffff" fill-opacity="0.35"
        letter-spacing="6">NOUN STUDY</text>
</svg>
